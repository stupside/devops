name: "Ansible"

on:
  push:
    branches: [ main ]
    paths:
      - "./ansible"
      
  pull_request:
    branches: [ main ]
    paths:
      - "./ansible"

permissions:
  contents: read

jobs:
  ansible:
    name: 'Ansible'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:    
        shell: bash
        working-directory: "./ansible"

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Ansible
      run: |
        sudo apt update
        sudo apt install -y python3-pip
        python3 -m pip install --user ansible-core

    - name: Run ansible-playbook
      run: |
        bash ${GITHUB_WORKSPACE}/ansible.sh site