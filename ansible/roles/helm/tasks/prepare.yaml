- name: Install python3-pip package
  apt:
    name: python3-pip
    state: latest
  tags: 
    - install_python3_pip

- name: Install kubernetes python module with pip
  pip:
    name: kubernetes
    state: latest
  tags: 
    - install_kubernetes_python_module

- name: Install openshift python module with pip
  pip:
    name: openshift
    state: latest
  tags: 
    - install_openshift_python_module
