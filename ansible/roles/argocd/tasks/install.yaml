---
- name: Add ArgoCD Helm repository
  kubernetes.core.helm_repository:
    name: argocd
    repo_url: "{{ argocd_helm_repo_url }}"
    kubeconfig: "{{ k3s_local_kubeconfig_path }}"
  tags: add_argocd_helm_repo

- name: Create namespace for ArgoCD
  k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ argocd_namespace }}"
    kubeconfig: "{{ k3s_local_kubeconfig_path }}"
  tags: create_argocd_namespace

- name: Install ArgoCD using Helm
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: "{{ argocd_namespace }}"
    chart_version: "{{ argocd_chart_version }}"
    values:
      ingress:
        enabled: true
        path: /
        hosts:
          - argocd.{{ cloudflare_domain }}
        annotations:
          kubernetes.io/ingress.class: nginx
          kubernetes.io/tls-acme: "true"
    kubeconfig: "{{ k3s_local_kubeconfig_path }}"
  tags: install_argocd

- name: Add ArgoCD App of Apps
  kubernetes.core.helm:
    name: applications
    release_namespace: "{{ argocd_namespace }}"
    chart_ref: "{{ devops_repository }}/{{ devops_repository_argocd_path }}"
    values:
      dex.config: |
        connectors:
          - type: github
            id: github
            name: GitHub
            config:
              clientID: "{{ github_client_id }}"
              clientSecret: "{{ github_client_secret }}"

    kubeconfig: "{{ k3s_local_kubeconfig_path }}"
  tags: add_argocd_app_of_apps
