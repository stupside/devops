---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mirador-io
  namespace: arc-runners
spec:
  interval: 1h
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.x"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
  values:
    ## TODO: Set your GitHub organization or repository URL
    githubConfigUrl: "https://github.com/mirador-io"

    ## Reference to the pre-created Kubernetes Secret
    githubConfigSecret: arc-github-token-mirador-io

    ## Runner scale set name (use in workflow: runs-on: arc-xonery)
    runnerScaleSetName: arc-mirador-io

    minRunners: 0
    maxRunners: 5

    ## Enable Docker-in-Docker sidecar (auto-injected by the chart)
    containerMode:
      type: "dind"

    ## Runner pod template (dind sidecar is auto-added when containerMode.type=dind)
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 4Gi

    ## Listener pod template
    listenerTemplate:
      spec:
        containers:
          - name: listener
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
