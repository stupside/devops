---
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  labels:
    toolkit.fluxcd.io/tenant: dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev
  namespace: apps
  labels:
    toolkit.fluxcd.io/tenant: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: apps
  name: gotk-reconciler
  labels:
    toolkit.fluxcd.io/tenant: dev
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: User
    name: gotk:apps:reconciler
  - kind: ServiceAccount
    name: dev
    namespace: apps
