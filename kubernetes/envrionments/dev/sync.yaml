---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: dev
  namespace: apps
spec:
  interval: 1m
  ref:
    branch: main
  url: ssh://git@github.com/stupside/devops
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev
  namespace: apps
spec:
  interval: 5m
  serviceAccountName: dev
  path: ./kubernetes/environments/dev/apps
  sourceRef:
    name: dev
    kind: GitRepository
  prune: true
