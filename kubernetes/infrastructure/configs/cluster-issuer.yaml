---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token-secret
type: Opaque
stringData:
  api-token: <API Token>
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: me@xonery.dev
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-pk
    solvers:
      - http01:
          ingress:
            class: nginx
      # - dns01:
      #     cloudflare:
      #       apiTokenSecretRef:
      #         key: api-token
      #         name: cloudflare-api-token-secret