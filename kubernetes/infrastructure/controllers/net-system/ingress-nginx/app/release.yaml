apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: net-system
spec:
  interval: 30m
  chart:
    spec:
      version: "*"
      interval: 12h
      chart: ingress-nginx
      sourceRef:
        name: ingress-nginx
        kind: HelmRepository
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controller:
      config:
        use-forwarded-headers: true
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: net-system
      resources:
          requests:
            cpu: 10m
            memory: 250Mi
          limits:
            memory: 500Mi