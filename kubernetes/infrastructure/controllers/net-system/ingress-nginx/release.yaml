apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: net-system
spec:
  interval: 30m
  chart:
    spec:
      version: "4.x"
      interval: 12h
      chart: ingress-nginx
      sourceRef:
        name: ingress-nginx
        kind: HelmRepository
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    service:
      type: LoadBalancer
    controller:
      admissionWebhooks:
        enabled: true
      config:
        use-forwarded-headers: true