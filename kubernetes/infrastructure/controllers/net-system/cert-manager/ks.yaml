---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: net-system
spec:
  path: ./kubernetes/infrastructure/controllers/net-system/cert-manager
  sourceRef:
    name: flux-system
    kind: GitRepository
  dependsOn:
    - name: ingress-nginx
  wait: true
  prune: true
  timeout: 5m
  interval: 30m
  retryInterval: 1m
