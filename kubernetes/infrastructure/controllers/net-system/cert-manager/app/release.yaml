apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: net-system
spec:
  interval: 30m
  chart:
    spec:
      interval: 12h
      version: "1.x"
      chart: cert-manager
      sourceRef:
        name: jetstack
        kind: HelmRepository
        namespace: infrastructure-repositories
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    installCRDs: true