---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: capacitor
  namespace: flux-system
spec:
  targetNamespace: flux-system
  sourceRef:
    name: capacitor
    kind: OCIRepository
  path: "./"
  wait: true
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m