---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: capacitor
  namespace: flux-system
spec:
  interval: 12h
  url: oci://ghcr.io/gimlet-io/capacitor-manifests
  ref:
    semver: ">=0.1.0"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: capacitor
  namespace: flux-system
spec:
  path: "./"
  wait: true
  prune: true
  timeout: 5m
  interval: 1h
  retryInterval: 2m
  sourceRef:
    name: capacitor
    kind: OCIRepository
  targetNamespace: flux-system