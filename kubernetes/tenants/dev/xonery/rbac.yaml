---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xonery-sa
  namespace: xonery-ns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant
  namespace: xonery-ns
rules:
  # Permissions for managing core Kubernetes resources
  - apiGroups:
      - ""
    resources:
      - "secrets"
      - "services"
    verbs:
      - get
      - list
      - watch
      - patch
      - create
      - update
      - delete
  # Permissions for managing network resources
  - apiGroups:
      - "networking.k8s.io" # API group for Ingress
    resources:
      - "ingresses"
    verbs:
      - get
      - list
      - patch
      - watch
      - create
      - update
      - delete
  # Permissions for managing Flux resources
  - apiGroups:
      - "source.toolkit.fluxcd.io"
    resources:
      - "gitrepositories"
      - "helmrepositories"
    verbs:
      - get
      - list
      - patch
      - watch
      - create
      - update
      - delete
  # Permissions for managing Helm resources
  - apiGroups:
      - "helm.toolkit.fluxcd.io"
    resources:
      - "helmreleases"
    verbs:
      - get
      - list
      - patch
      - watch
      - create
      - update
      - delete
  # Permissions for managing cert-manager resources
  - apiGroups:
      - "cert-manager.io"
    resources:
      - "certificates"
    verbs:
      - get
      - list
      - patch
      - watch
      - create
      - update
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: xonery-rb
  namespace: xonery-ns
roleRef:
  kind: Role
  name: tenant
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: xonery-sa
    namespace: xonery-ns
  - kind: User
    name: gotk:apps:reconciler
