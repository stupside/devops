---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: capacitor
  namespace: flux-system
spec:
  path: ./kubernetes/apps/dev/admin/capacitor
  sourceRef:
    name: flux-system
    kind: OCIRepository
  wait: false
  prune: true
  timeout: 5m
  interval: 30m
  retryInterval: 1m