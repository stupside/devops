---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: podinfo
  namespace: flux-system
spec:
  path: ./kubernetes/apps/dev/debug/podinfo
  sourceRef:
    name: devops-repo
    kind: GitRepository
  wait: false
  prune: true
  timeout: 5m
  interval: 30m
  retryInterval: 1m