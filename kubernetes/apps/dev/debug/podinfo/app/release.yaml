apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: apps-debug
spec:
  chart:
    spec:
      chart: podinfo
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: external-repositories
  interval: 30m
  install:
    remediation:
      retries: 3
  values:
    tls:
      enabled: false
    ingress: 
      enabled: false