apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: flux-system
  serviceAccountName: kustomize-controller
  chart:
    spec:
      version: "4.x"
      interval: 12h
      chart: ingress-nginx
      sourceRef:
        name: ingress-nginx
        kind: HelmRepository
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controller:
      replicaCount: 2
      dnsPolicy: ClusterFirst
      publishService:
        enabled: true
      service:
        enabled: true
        type: LoadBalancer
        externalTrafficPolicy: Local
      admissionWebhooks:
        enabled: true
      allowSnippetAnnotations: true
      config:
        enable-real-ip: "true"
        use-forwarded-headers: "true"
        proxy-real-ip-cidr: "0.0.0.0/0"
        compute-full-forwarded-for: "true"
        forwarded-for-header: "X-Forwarded-For"

    # Tuning DNS settings and other optional configurations
