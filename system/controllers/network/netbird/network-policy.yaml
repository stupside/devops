---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: netbird
  namespace: netbird
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: netbird
  egress:
    # Netbird management (HTTPS, STUN/TURN)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "3478"
              protocol: UDP
    # WireGuard + ICE (needs all UDP for hole punching)
    - toEntities:
        - world
      toPorts:
        - ports:
            - protocol: UDP
    # Gateway access (192.168.1.240/30)
    - toCIDR:
        - 192.168.1.240/30
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
  ingress:
    # WireGuard + ICE (needs all UDP for hole punching)
    - fromEntities:
        - world
      toPorts:
        - ports:
            - protocol: UDP
